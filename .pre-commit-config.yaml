repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        name: detect-secrets (baseline)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, src/, app.py, tests/, noxfile.py]
      - id: ruff-format
        args: [src/, app.py, tests/, noxfile.py]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [src/]
        additional_dependencies: [types-python-dateutil]
  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: bandit -r src/ -ll -ii
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
      - id: pip-audit
        name: pip-audit
        entry: pip-audit --requirement requirements.txt
        language: system
        pass_filenames: false
        always_run: false
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
