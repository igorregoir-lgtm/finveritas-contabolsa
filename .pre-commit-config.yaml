repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, src/, app.py]
      - id: ruff-format
        args: [src/, app.py]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [src/]
        additional_dependencies: [types-python-dateutil]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: false
