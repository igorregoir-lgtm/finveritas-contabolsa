version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: finveritas
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: finveritas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://finveritas:demo@db:5432/finveritas

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://finveritas:demo@db:5432/finveritas

volumes:
  pgdata:
